<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강아지 주역 운세 🐶</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="language-switcher">
        <select id="lang-select">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="es">🇪🇸 Español</option>
        </select>
    </div>

    <div class="container">
        <header>
            <h1 id="title">🐶 강아지 주역 운세 🐶</h1>
            <p id="subtitle" class="description">당신의 고민을 사랑스러운 강아지와 함께 주역으로 풀어보세요.</p>
        </header>
        
        <main>
            <div id="input-view">
                <div class="input-section">
                    <label id="label-concern" for="concern-input">어떤 게 궁금해? 언니가 알려줄게! ✨</label>
                    <textarea id="concern-input" placeholder="여기에 고민을 구체적으로 적어주면 강아지 친구들이 도와줄 거야..."></textarea>
                </div>
                <button id="start-button">🐾 운세 시작하기 🐾</button>
            </div>

            <div id="divination-view" class="hidden">
                <div id="divination-sticks-container" class="sticks-box-container">
                    <div id="pop-stick" class="popping-stick"></div>
                    <div class="stick-inner-area">
                        <div class="stick-set">
                            <div class="stick-item"></div>
                            <div class="stick-item"></div>
                            <div class="stick-item"></div>
                            <div class="stick-item"></div>
                            <div class="stick-item"></div>
                        </div>
                    </div>
                    <div class="sticks-box-image"></div>
                </div>
                <p id="divination-guide">나무통을 흔들어서 효(爻)를 하나씩 뽑아보자! (0/6)</p>
                <div id="drawn-lines-container"></div>
            </div>

            <div id="fortune-result" class="hidden">
                <div class="result-card">
                    <div id="user-concern-display" class="user-concern"></div>
                    <div class="dog-container-wrapper">
                        <div class="dog-pixel-art" id="dog-pixel-art-container"></div>
                        <div id="dog-breed-name" class="breed-label"></div>
                    </div>
                    <div id="hexagram-shape-display"></div>
                    <h2 id="hexagram-name" style="text-align:center; color:#ff4d6d; margin: 15px 0;"></h2>
                    <div id="hexagram-interpretation" class="interpretation-section"></div>
                    <div style="text-align:center; margin-top: 30px;">
                        <button id="retry-button">다시 해보기 🌸</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="disclaimer">
            <p id="disclaimer-text">※ 주역 운세는 참고용일 뿐이야! 너무 맹신하지 말고 재미로만 봐줘~ 💖</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
